version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:password@db:5432/neondb
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A playto_pay worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://neondb_owner:password@db:5432/neondb
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

  beat:
    build: .
    command: celery -A playto_pay beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://neondb_owner:password@db:5432/neondb
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
